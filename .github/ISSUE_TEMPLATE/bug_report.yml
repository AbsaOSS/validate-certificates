name: Bug Report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please supply complete reproduction details to speed up resolution.

  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what went wrong.
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: The workflow YAML and certificate details that trigger the issue.
      placeholder: |
        1. Workflow step configuration
        2. Certificate details (subject, expiry, etc.)
        3. Observed log output
    validations:
      required: true

  - type: textarea
    id: expected-state
    attributes:
      label: Expected state
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Impact / Severity
      description: Level of impact
      options:
        - Blocker
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: dropdown
    id: runner-os
    attributes:
      label: Runner OS
      description: Which runner OS does this occur on?
      options:
        - ubuntu-latest
        - macos-latest
        - Both
        - Other / self-hosted
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Attachments / Evidence
      description: Logs, screenshots, or relevant excerpts from the Actions run.
      placeholder: Paste relevant log output.
    validations:
      required: false

  - type: textarea
    id: related
    attributes:
      label: Related / References
      description: Link other issues/PRs.
      placeholder: "#456, #789"
    validations:
      required: false
